- name: Check whether Starship is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/starship
  register: starship_bin

- name: Ensure required dependencies are installed
  ansible.builtin.package:
    name: curl
    state: present
  become: true

- name: Download Starship installer
  ansible.builtin.get_url:
    url: https://starship.rs/install.sh
    dest: /tmp/starship_install.sh
    mode: "0755"
    owner: root
    group: root
    force: true
  become: true
  when: not starship_bin.stat.exists

- name: Run Starship install script
  ansible.builtin.command:
    cmd: /bin/sh /tmp/starship_install.sh -y
    creates: /usr/local/bin/starship
  become: true
  when: not starship_bin.stat.exists

- name: Remove Starship install script
  ansible.builtin.file:
    path: /tmp/starship_install.sh
    state: absent
  become: true
  when: not starship_bin.stat.exists

- name: Verify Starship installation
  ansible.builtin.command:
    cmd: /usr/local/bin/starship --version
  register: starship_version
  changed_when: false
  become: true
