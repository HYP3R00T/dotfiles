[tools]
markdownlint-cli2 = "latest"
node = "lts"
prek = "latest"
shellcheck = "latest"
shfmt = "latest"
uv = "latest"

[settings]
experimental = true

[settings.aqua]
github_attestations = false

[env]
_.file = '.env'       # for sensitive data
UV_LINK_MODE = "copy"

[hooks]
enter = "bash ./scripts/enter_project.sh"

[tasks.ansible_lint]
run = "ANSIBLE_CONFIG=ansible/ansible.cfg uv run ansible-lint ansible/"
description = "Run ansible lint"

[tasks.ansible_check]
run = "ANSIBLE_CONFIG=ansible/ansible.cfg uv run ansible-playbook --check ansible/playbooks/common.yml"
description = "Run a quick ansible check-mode pass"

[tasks.docs]
run = "zensical serve"
description = "Serve the documentation locally"
